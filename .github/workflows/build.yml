name: Build

on:
  push:
    branches:
      - electron-vue-refactor

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: "*.dmg"
          - os: windows-latest
            artifact: "*.exe"
          - os: ubuntu-latest
            artifact: "*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: |
          pnpm vue-tsc --noEmit
          pnpm vite build
          pnpm electron-builder --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}
          path: release/**/${{ matrix.artifact }}
          if-no-files-found: error
